    ReviewItemIn:
      properties:
        text:
          type: string
          maxLength: 3000
          minLength: 1
          title: Text
        rating:
          anyOf:
          - type: number
            maximum: 5.0
            minimum: 0.0
          - type: 'null'
          title: Rating
        created_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Created At
        source:
          anyOf:
          - type: string
          - type: 'null'
          title: Source
      type: object
      required:
      - text
      title: ReviewItemIn
    ReviewReliabilityIn:
      properties:
        place_name:
          type: string
          maxLength: 200
          minLength: 1
          title: Place Name
        place_id:
          anyOf:
          - type: string
            maxLength: 60
          - type: 'null'
          title: Place Id
        area_id:
          anyOf:
          - type: integer
            exclusiveMinimum: 0.0
          - type: 'null'
          title: Area Id
        source:
          anyOf:
          - type: string
            maxLength: 30
          - type: 'null'
          title: Source
        reviews:
          items:
            $ref: '#/components/schemas/ReviewItemIn'
          type: array
          title: Reviews
      type: object
      required:
      - place_name
      title: ReviewReliabilityIn
    ReviewReliabilityOut:
      properties:
