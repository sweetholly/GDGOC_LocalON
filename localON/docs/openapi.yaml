            $ref: '#/components/schemas/SuspiciousReviewOut'
          type: array
          title: Suspicious Reviews
        analyzed_at:
          type: string
          format: date-time
          title: Analyzed At
        model_version:
          type: string
          title: Model Version
      type: object
      required:
      - place_key
      - place_name
      - total_reviews
      - ad_suspect_ratio
      - ai_suspect_ratio
      - duplicate_ratio
      - trust_score
      - grade
      - suspicious_reviews
      - analyzed_at
      - model_version
      title: ReviewReliabilityOut
    RisingOut:
