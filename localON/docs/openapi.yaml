openapi: 3.0.3
info:
  title: LOCAL ON API
  version: 1.0.0
  description: |
    LOCAL ON API는 서울 주요 지역의 실시간 혼잡/수요/날씨/트렌드 정보를 제공합니다.
    프론트엔드 조회 시나리오에 맞춰 메인, 지역상세, 검색 중심으로 구성된 Read API입니다.

    엔드포인트 개요:
    - GET /main: 메인 화면용 지역 요약 + 트렌드 블록
    - GET /areas/{area_id}: 지역 상세 화면용 종합 데이터
    - GET /search: 키워드 기반 지역 검색

    검증/오류 규칙:
    - 경로/쿼리 파라미터 검증 실패: HTTP 422
    - 리소스 미존재: HTTP 404
servers:
  - url: http://localhost:8000
tags:
  - name: main
    description: 메인 화면에 필요한 집계 데이터 API
  - name: areas
    description: 특정 지역 상세 데이터 API
  - name: search
    description: 키워드 기반 지역 검색 API
paths:
  /main:
    get:
      tags: [main]
      summary: 메인 화면 데이터 조회
      description: |
        메인 화면에 필요한 지역 요약 목록과 트렌드 정보를 반환합니다.
        `lat`, `lng`를 함께 전달하면 거리 기반 정렬(가능한 항목에 한함)이 적용됩니다.
        위치 정보가 없으면 서버 기본 정렬 기준으로 반환됩니다. (활성된 120개 지역 반환)
      parameters:
        - in: query
          name: lat
          required: false
          schema:
            type: number
            format: float
          description: 사용자 위도(WGS84)
          example: 37.4979
        - in: query
          name: lng
          required: false
          schema:
            type: number
            format: float
          description: 사용자 경도(WGS84)
          example: 127.0276
      responses:
        "200":
          description: 메인 화면 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MainOut"
              example:
                areas:
                  - area_id: 1
                    area_cd: POI001
                    name: 강남 MICE 관광특구
                    category: 관광특구
                    lat: 37.513
                    lng: 127.0597
                    congestion_level: 보통
                    congestion_score: 50.0
                    population_min: 32000
                    population_max: 35000
                    weather_temp: 12.5
                    air_idx: 보통
                    distance_m: 1200
                    updated_at: "2026-03-08T14:30:00"
                trends:
                  hot_places:
                    - rank: 1
                      area_id: 3
                      name: 명동 관광특구
                      congestion_level: 붐빔
                      congestion_score: 88.5
                      rank_change: 2
                  rising:
                    - area_id: 68
                      name: 성수카페거리
                      change_pct: 22.3
                      change_label: 급상승
        "422":
          description: 검증 오류(쿼리 타입/형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOut"
              example:
                error: BAD_REQUEST
                message: "lat 값 형식이 올바르지 않습니다"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOut"
              example:
                error: INTERNAL_ERROR
                message: 서버 내부 오류가 발생했습니다

  /areas/{area_id}:
    get:
      tags: [areas]
      summary: 지역 상세 조회
      description: |
        단일 지역의 상세 정보를 반환합니다.
        혼잡도, 시간대 그래프, 추천 방문시간, 수요, 상권, 날씨가 포함됩니다.
        `date`를 지정하면 해당 일자의 시간대 데이터를 조회합니다.
      parameters:
        - in: path
          name: area_id
          required: true
          schema:
            type: integer
            minimum: 1
          description: 지역 ID(1 이상의 정수)
          example: 1
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
          description: 시간대 데이터 조회 기준일(YYYY-MM-DD)
          example: "2026-03-08"
      responses:
        "200":
          description: 지역 상세 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaDetailOut"
              example:
                area_id: 1
                area_cd: POI001
                name: 강남 MICE 관광특구
                eng_name: Gangnam MICE Special Tourist Zone
                category: 관광특구
                lat: 37.513
                lng: 127.0597
                congestion:
                  level: 보통
                  score: 50.0
                  msg: 원활한 흐름입니다
                  population_min: 32000
                  population_max: 35000
                  sdot_current: 245
                  sdot_baseline: 200
                  is_estimated: false
                  updated_at: "2026-03-08T14:30:00"
                hourly:
                  - hour: 14
                    actual: 9100
                    baseline: 8600
                    level: 보통
                recommendations:
                  - time_range: "10:00~11:00"
                    expected_level: 여유
                    avg_population: 18000
                demand:
                  type: 관광 방문 수요 중심
                  resident_rate: 35.2
                  non_resident_rate: 64.8
                  demographics:
                    male_rate: 48.5
                    female_rate: 51.5
                    age_0: 2.1
                    age_10: 8.3
                    age_20: 28.3
                    age_30: 25.1
                    age_40: 18.5
                    age_50: 10.2
                    age_60: 5.4
                    age_70: 2.1
                commercial:
                  level: 보통
                  payment_cnt: 1523
                  payment_amt_min: 45000000
                  payment_amt_max: 52000000
                weather:
                  temp: 12.5
                  sensible_temp: 10.2
                  humidity: 45
                  wind_spd: 3.2
                  pm25: 15.0
                  pm25_index: 좋음
                  pm10: 28.0
                  pm10_index: 보통
        "422":
          description: 검증 오류(경로/쿼리 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOut"
              example:
                error: BAD_REQUEST
                message: "area_id는 1 이상의 정수여야 합니다"
        "404":
          description: 대상 지역 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOut"
              example:
                error: NOT_FOUND
                message: 해당 지역을 찾을 수 없습니다
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOut"
              example:
                error: INTERNAL_ERROR
                message: 서버 내부 오류가 발생했습니다

  /search:
    get:
      tags: [search]
      summary: 지역 검색
      description: |
        키워드로 활성 지역을 검색합니다.
        결과 정렬/우선순위는 서버 검색 로직(완전일치/별칭/부분일치)에 따릅니다.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
          description: 검색 키워드(빈 문자열 불가)
          example: 홍대
      responses:
        "200":
          description: 검색 결과 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchOut"
              example:
                query: 홍대
                results:
                  - area_id: 7
                    area_cd: POI007
                    name: 홍대 관광특구
                    category: 관광특구
                    lat: 37.5563
                    lng: 126.922
                    congestion_level: 약간 붐빔
                    congestion_score: 65.0
        "422":
          description: 검증 오류(누락/빈값/형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOut"
              example:
                error: BAD_REQUEST
                message: "q 파라미터는 필수입니다"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOut"
              example:
                error: INTERNAL_ERROR
                message: 서버 내부 오류가 발생했습니다

components:
  schemas:
    ErrorOut:
      type: object
      description: API 오류 응답 공통 포맷
      required: [error, message]
      properties:
        error:
          type: string
          description: 오류 코드
        message:
          type: string
          description: 사람이 읽을 수 있는 오류 메시지
      example:
        error: BAD_REQUEST
        message: 요청 파라미터가 올바르지 않습니다

    AreaSummaryOut:
      type: object
      description: "`/main`의 지역 목록에 사용되는 지역 요약 정보"
      required:
        [
          area_id,
          area_cd,
          name,
          category,
          lat,
          lng,
          congestion_level,
          congestion_score,
          population_min,
          population_max,
          weather_temp,
          air_idx,
          distance_m,
          updated_at,
        ]
      properties:
        area_id:
          type: integer
          description: 내부 지역 식별자
        area_cd:
          type: string
          description: "지역 코드(예: POI001)"
        name:
          type: string
          description: 지역명
        category:
          type: string
          nullable: true
        lat:
          type: number
          format: float
          nullable: true
        lng:
          type: number
          format: float
          nullable: true
        congestion_level:
          type: string
          nullable: true
          description: 혼잡도 레벨(문자형)
        congestion_score:
          type: number
          format: float
          nullable: true
          description: 혼잡도 점수(수치형)
        population_min:
          type: integer
          nullable: true
        population_max:
          type: integer
          nullable: true
        weather_temp:
          type: number
          format: float
          nullable: true
        air_idx:
          type: string
          nullable: true
        distance_m:
          type: integer
          nullable: true
          description: 사용자 위치 기준 거리(m), 위치 미입력 시 null
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: 최신 지표 갱신 시각

    HotPlaceOut:
      type: object
      description: 인기 지역 트렌드 순위 항목
      required: [rank, area_id, name, congestion_level, congestion_score, rank_change]
      properties:
        rank:
          type: integer
        area_id:
          type: integer
        name:
          type: string
        congestion_level:
          type: string
          nullable: true
        congestion_score:
          type: number
          format: float
          nullable: true
        rank_change:
          type: integer
          nullable: true

    RisingOut:
      type: object
      description: 상승 지역 트렌드 항목
      required: [area_id, name, change_pct, change_label]
      properties:
        area_id:
          type: integer
          nullable: true
        name:
          type: string
          nullable: true
        change_pct:
          type: number
          format: float
          nullable: true
        change_label:
          type: string
          nullable: true

    TrendsOut:
      type: object
      description: 메인 응답의 트렌드 블록
      required: [hot_places, rising]
      properties:
        hot_places:
          type: array
          items:
            $ref: "#/components/schemas/HotPlaceOut"
        rising:
          type: array
          items:
            $ref: "#/components/schemas/RisingOut"

    MainOut:
      type: object
      description: "`/main` 최상위 응답 객체"
      required: [areas, trends]
      properties:
        areas:
          type: array
          items:
            $ref: "#/components/schemas/AreaSummaryOut"
        trends:
          $ref: "#/components/schemas/TrendsOut"
      example:
        areas:
          - area_id: 1
            area_cd: POI001
            name: 강남 MICE 관광특구
            category: 관광특구
            lat: 37.513
            lng: 127.0597
            congestion_level: 보통
            congestion_score: 50.0
            population_min: 32000
            population_max: 35000
            weather_temp: 12.5
            air_idx: 보통
            distance_m: 1200
            updated_at: "2026-03-08T14:30:00"
        trends:
          hot_places:
            - rank: 1
              area_id: 3
              name: 명동 관광특구
              congestion_level: 붐빔
              congestion_score: 88.5
              rank_change: 2
          rising:
            - area_id: 68
              name: 성수카페거리
              change_pct: 22.3
              change_label: 급상승

    CongestionOut:
      type: object
      description: 지역 상세 응답의 혼잡도 블록
      required:
        [
          level,
          score,
          msg,
          population_min,
          population_max,
          sdot_current,
          sdot_baseline,
          is_estimated,
          updated_at,
        ]
      properties:
        level:
          type: string
          nullable: true
        score:
          type: number
          format: float
          nullable: true
        msg:
          type: string
          nullable: true
        population_min:
          type: integer
          nullable: true
        population_max:
          type: integer
          nullable: true
        sdot_current:
          type: integer
          nullable: true
        sdot_baseline:
          type: integer
          nullable: true
        is_estimated:
          type: boolean
          description: 일부 값이 추정치인 경우 true
        updated_at:
          type: string
          format: date-time
          nullable: true

    HourlyOut:
      type: object
      description: 선택한 날짜의 시간대별 데이터 포인트
      required: [hour, actual, baseline, level]
      properties:
        hour:
          type: integer
        actual:
          type: integer
          nullable: true
        baseline:
          type: integer
          nullable: true
        level:
          type: string
          nullable: true

    RecommendationOut:
      type: object
      description: 추천 방문 시간대 항목
      required: [time_range, expected_level, avg_population]
      properties:
        time_range:
          type: string
        expected_level:
          type: string
        avg_population:
          type: integer

    DemographicsOut:
      type: object
      description: 성별/연령대 인구 구성 비율
      required:
        [
          male_rate,
          female_rate,
          age_0,
          age_10,
          age_20,
          age_30,
          age_40,
          age_50,
          age_60,
          age_70,
        ]
      properties:
        male_rate:
          type: number
          format: float
          nullable: true
        female_rate:
          type: number
          format: float
          nullable: true
        age_0:
          type: number
          format: float
          nullable: true
        age_10:
          type: number
          format: float
          nullable: true
        age_20:
          type: number
          format: float
          nullable: true
        age_30:
          type: number
          format: float
          nullable: true
        age_40:
          type: number
          format: float
          nullable: true
        age_50:
          type: number
          format: float
          nullable: true
        age_60:
          type: number
          format: float
          nullable: true
        age_70:
          type: number
          format: float
          nullable: true

    DemandOut:
      type: object
      description: 인구 지표 기반 수요 해석 블록
      required: [type, resident_rate, non_resident_rate, demographics]
      properties:
        type:
          type: string
        resident_rate:
          type: number
          format: float
          nullable: true
        non_resident_rate:
          type: number
          format: float
          nullable: true
        demographics:
          $ref: "#/components/schemas/DemographicsOut"

    CommercialOut:
      type: object
      description: 지역 상권 요약 정보
      required: [level, payment_cnt, payment_amt_min, payment_amt_max]
      properties:
        level:
          type: string
          nullable: true
        payment_cnt:
          type: integer
          nullable: true
        payment_amt_min:
          type: integer
          nullable: true
        payment_amt_max:
          type: integer
          nullable: true

    WeatherOut:
      type: object
      description: 지역 날씨/대기질 요약 정보
      required:
        [temp, sensible_temp, humidity, wind_spd, pm25, pm25_index, pm10, pm10_index]
      properties:
        temp:
          type: number
          format: float
          nullable: true
        sensible_temp:
          type: number
          format: float
          nullable: true
        humidity:
          type: integer
          nullable: true
        wind_spd:
          type: number
          format: float
          nullable: true
        pm25:
          type: number
          format: float
          nullable: true
        pm25_index:
          type: string
          nullable: true
        pm10:
          type: number
          format: float
          nullable: true
        pm10_index:
          type: string
          nullable: true

    AreaDetailOut:
      type: object
      description: "`/areas/{area_id}` 최상위 응답 객체"
      required:
        [
          area_id,
          area_cd,
          name,
          eng_name,
          category,
          lat,
          lng,
          congestion,
          hourly,
          recommendations,
          demand,
          commercial,
          weather,
        ]
      properties:
        area_id:
          type: integer
        area_cd:
          type: string
        name:
          type: string
        eng_name:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        lat:
          type: number
          format: float
          nullable: true
        lng:
          type: number
          format: float
          nullable: true
        congestion:
          $ref: "#/components/schemas/CongestionOut"
        hourly:
          type: array
          items:
            $ref: "#/components/schemas/HourlyOut"
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/RecommendationOut"
        demand:
          $ref: "#/components/schemas/DemandOut"
        commercial:
          $ref: "#/components/schemas/CommercialOut"
        weather:
          $ref: "#/components/schemas/WeatherOut"
      example:
        area_id: 1
        area_cd: POI001
        name: 강남 MICE 관광특구
        eng_name: Gangnam MICE Special Tourist Zone
        category: 관광특구
        lat: 37.513
        lng: 127.0597
        congestion:
          level: 보통
          score: 50.0
          msg: 원활한 흐름입니다
          population_min: 32000
          population_max: 35000
          sdot_current: 245
          sdot_baseline: 200
          is_estimated: false
          updated_at: "2026-03-08T14:30:00"
        hourly:
          - hour: 14
            actual: 9100
            baseline: 8600
            level: 보통
        recommendations:
          - time_range: "10:00~11:00"
            expected_level: 여유
            avg_population: 18000
        demand:
          type: 관광 방문 수요 중심
          resident_rate: 35.2
          non_resident_rate: 64.8
          demographics:
            male_rate: 48.5
            female_rate: 51.5
            age_0: 2.1
            age_10: 8.3
            age_20: 28.3
            age_30: 25.1
            age_40: 18.5
            age_50: 10.2
            age_60: 5.4
            age_70: 2.1
        commercial:
          level: 보통
          payment_cnt: 1523
          payment_amt_min: 45000000
          payment_amt_max: 52000000
        weather:
          temp: 12.5
          sensible_temp: 10.2
          humidity: 45
          wind_spd: 3.2
          pm25: 15.0
          pm25_index: 좋음
          pm10: 28.0
          pm10_index: 보통

    SearchResultOut:
      type: object
      description: 검색 결과 단일 항목
      required:
        [area_id, area_cd, name, category, lat, lng, congestion_level, congestion_score]
      properties:
        area_id:
          type: integer
        area_cd:
          type: string
        name:
          type: string
        category:
          type: string
          nullable: true
        lat:
          type: number
          format: float
          nullable: true
        lng:
          type: number
          format: float
          nullable: true
        congestion_level:
          type: string
          nullable: true
        congestion_score:
          type: number
          format: float
          nullable: true

    SearchOut:
      type: object
      description: "`/search` 최상위 응답 객체"
      required: [query, results]
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultOut"
      example:
        query: 홍대
        results:
