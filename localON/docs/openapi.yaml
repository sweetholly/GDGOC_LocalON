    HourlyOut:
      properties:
        hour:
          type: integer
          title: Hour
        actual:
          anyOf:
          - type: integer
          - type: 'null'
          title: Actual
        baseline:
          anyOf:
          - type: integer
          - type: 'null'
          title: Baseline
        level:
          anyOf:
          - type: string
          - type: 'null'
          title: Level
        actual_avg:
          anyOf:
          - type: number
          - type: 'null'
          title: Actual Avg
        actual_min:
          anyOf:
          - type: integer
          - type: 'null'
          title: Actual Min
        actual_max:
          anyOf:
          - type: integer
          - type: 'null'
          title: Actual Max
      type: object
      required:
      - hour
      - actual
      - baseline
      - level
      title: HourlyOut
    MainOut:
      properties:
        areas:
          items:
            $ref: '#/components/schemas/AreaSummaryOut'
          type: array
          title: Areas
        trends:
          $ref: '#/components/schemas/TrendsOut'
      type: object
      required:
      - areas
      - trends
      title: MainOut
    PopulationForecastOut:
      properties:
        at:
          type: string
          format: date-time
          title: At
        expected_population:
          anyOf:
          - type: integer
          - type: 'null'
          title: Expected Population
        confidence:
          type: number
          title: Confidence
        cause_factors:
          items:
            type: string
          type: array
          title: Cause Factors
      type: object
      required:
      - at
      - expected_population
      - confidence
      - cause_factors
