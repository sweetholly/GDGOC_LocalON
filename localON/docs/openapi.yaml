      - name
      - change_pct
      - change_label
      title: RisingOut
    SearchOut:
      properties:
        query:
          type: string
          title: Query
        results:
          items:
            $ref: '#/components/schemas/SearchResultOut'
          type: array
          title: Results
      type: object
      required:
      - query
      - results
      title: SearchOut
    SearchResultOut:
