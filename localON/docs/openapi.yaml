          title: Area Id
        area_name:
          type: string
          title: Area Name
        lookback_days:
          type: integer
          title: Lookback Days
        generated_at:
          type: string
          format: date-time
          title: Generated At
        hottest_slots:
          items:
            $ref: '#/components/schemas/VisitTimeSlotOut'
          type: array
          title: Hottest Slots
        recommended_slots:
          items:
            $ref: '#/components/schemas/VisitTimeSlotOut'
          type: array
          title: Recommended Slots
        next_hours_forecast:
          items:
            $ref: '#/components/schemas/PopulationForecastOut'
          type: array
