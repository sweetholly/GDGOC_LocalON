          - type: string
          - type: 'null'
          title: Level
        citydata_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Citydata Score
        sdot_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Sdot Score
        msg:
          anyOf:
          - type: string
          - type: 'null'
