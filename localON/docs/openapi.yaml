openapi: 3.1.0
info:
  title: LOCAL ON API
  description: Real-time Seoul citydata based congestion information API
  version: 1.0.0
paths:
  /main:
    get:
      tags:
      - main
      summary: Main Endpoint
      operationId: main_endpoint_main_get
      parameters:
      - name: lat
        in: query
        required: false
        schema:
          anyOf:
          - type: number
          - type: 'null'
          description: User latitude
          title: Lat
        description: User latitude
      - name: lng
        in: query
        required: false
        schema:
          anyOf:
          - type: number
          - type: 'null'
          description: User longitude
          title: Lng
        description: User longitude
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MainOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /areas/{area_id}:
    get:
      tags:
      - areas
      summary: Area Detail Endpoint
      operationId: area_detail_endpoint_areas__area_id__get
      parameters:
      - name: area_id
        in: path
        required: true
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Area ID
          title: Area Id
        description: Area ID
      - name: date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: 'Date for hourly timeseries (default: today)'
          title: Date
        description: 'Date for hourly timeseries (default: today)'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaDetailOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /search:
    get:
      tags:
      - search
      summary: Search Endpoint
      operationId: search_endpoint_search_get
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: Search keyword
          title: Q
        description: Search keyword
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /areas/{area_id}/visit-insights:
    get:
      tags:
      - insights
      summary: Area Visit Insights Endpoint
      operationId: area_visit_insights_endpoint_areas__area_id__visit_insights_get
      parameters:
      - name: area_id
        in: path
        required: true
        schema:
          type: integer
          exclusiveMinimum: 0
          description: Area ID
          title: Area Id
        description: Area ID
      - name: lookback_days
        in: query
        required: false
        schema:
          type: integer
          maximum: 90
          minimum: 7
          description: Historical lookback window
          default: 28
          title: Lookback Days
        description: Historical lookback window
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitInsightOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /reviews/reliability:
    post:
      tags:
      - insights
      summary: Review Reliability Endpoint
      operationId: review_reliability_endpoint_reviews_reliability_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewReliabilityIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewReliabilityOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AreaDetailOut:
      properties:
        area_id:
          type: integer
          title: Area Id
        area_cd:
          type: string
          title: Area Cd
        name:
          type: string
          title: Name
        eng_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Eng Name
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
        lat:
          anyOf:
          - type: number
          - type: 'null'
          title: Lat
        lng:
          anyOf:
          - type: number
          - type: 'null'
          title: Lng
        congestion:
          $ref: '#/components/schemas/CongestionOut'
        hourly:
          items:
            $ref: '#/components/schemas/HourlyOut'
          type: array
          title: Hourly
        recommendations:
          items:
            $ref: '#/components/schemas/RecommendationOut'
          type: array
          title: Recommendations
        demand:
          $ref: '#/components/schemas/DemandOut'
        commercial:
          $ref: '#/components/schemas/CommercialOut'
        weather:
          $ref: '#/components/schemas/WeatherOut'
      type: object
      required:
      - area_id
      - area_cd
      - name
      - eng_name
      - category
      - lat
      - lng
      - congestion
      - hourly
      - recommendations
      - demand
      - commercial
      - weather
      title: AreaDetailOut
    AreaSummaryOut:
      properties:
        area_id:
          type: integer
          title: Area Id
        area_cd:
          type: string
          title: Area Cd
        name:
          type: string
          title: Name
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
        lat:
          anyOf:
          - type: number
          - type: 'null'
          title: Lat
        lng:
          anyOf:
          - type: number
          - type: 'null'
          title: Lng
        congestion_level:
          anyOf:
          - type: string
          - type: 'null'
          title: Congestion Level
        citydata_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Citydata Score
        sdot_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Sdot Score
        population_min:
          anyOf:
          - type: integer
          - type: 'null'
          title: Population Min
        population_max:
          anyOf:
          - type: integer
          - type: 'null'
          title: Population Max
        weather_temp:
          anyOf:
          - type: number
          - type: 'null'
          title: Weather Temp
        air_idx:
          anyOf:
          - type: string
          - type: 'null'
          title: Air Idx
        distance_m:
          anyOf:
          - type: integer
          - type: 'null'
          title: Distance M
        updated_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Updated At
      type: object
      required:
      - area_id
      - area_cd
      - name
      - category
      - lat
      - lng
      - congestion_level
      - citydata_score
      - sdot_score
      - population_min
      - population_max
      - weather_temp
      - air_idx
      - updated_at
      title: AreaSummaryOut
    CommercialOut:
      properties:
        level:
          anyOf:
          - type: string
          - type: 'null'
          title: Level
        payment_cnt:
          anyOf:
          - type: integer
          - type: 'null'
          title: Payment Cnt
        payment_amt_min:
          anyOf:
          - type: integer
          - type: 'null'
          title: Payment Amt Min
        payment_amt_max:
          anyOf:
          - type: integer
          - type: 'null'
          title: Payment Amt Max
      type: object
      required:
      - level
      - payment_cnt
      - payment_amt_min
      - payment_amt_max
      title: CommercialOut
    CongestionOut:
      properties:
        level:
