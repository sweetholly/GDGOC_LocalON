          title: Updated At
      type: object
      required:
      - level
      - citydata_score
      - sdot_score
      - msg
      - population_min
      - population_max
      - sdot_current
      - sdot_baseline
      - is_estimated
      - updated_at
      title: CongestionOut
    DemandOut:
      properties:
