      type: object
      required:
      - area_id
      - area_name
      - lookback_days
      - generated_at
      - hottest_slots
      - recommended_slots
      - next_hours_forecast
      - event_signals
      title: VisitInsightOut
    VisitTimeSlotOut:
      properties:
        day_of_week:
          type: integer
          title: Day Of Week
        day_label:
          type: string
          title: Day Label
        hour:
          type: integer
          title: Hour
        time_range:
          type: string
          title: Time Range
        avg_population:
          anyOf:
          - type: integer
          - type: 'null'
          title: Avg Population
        congestion_ratio:
          anyOf:
          - type: number
          - type: 'null'
          title: Congestion Ratio
        hot_score:
          type: number
          title: Hot Score
        visit_score:
          type: number
          title: Visit Score
        confidence:
          type: number
          title: Confidence
        primary_cause:
          anyOf:
          - type: string
          - type: 'null'
          title: Primary Cause
      type: object
      required:
      - day_of_week
      - day_label
      - hour
      - time_range
      - avg_population
      - congestion_ratio
      - hot_score
      - visit_score
      - confidence
      - primary_cause
      title: VisitTimeSlotOut
    WeatherOut:
      properties:
        temp:
          anyOf:
          - type: number
          - type: 'null'
          title: Temp
        sensible_temp:
          anyOf:
          - type: number
          - type: 'null'
          title: Sensible Temp
        humidity:
          anyOf:
          - type: integer
          - type: 'null'
          title: Humidity
        wind_spd:
          anyOf:
          - type: number
          - type: 'null'
          title: Wind Spd
        pm25:
          anyOf:
          - type: number
          - type: 'null'
          title: Pm25
        pm25_index:
          anyOf:
          - type: string
          - type: 'null'
          title: Pm25 Index
        pm10:
          anyOf:
          - type: number
          - type: 'null'
          title: Pm10
        pm10_index:
          anyOf:
