          title: Review Trust Grade
        review_total_reviews:
          anyOf:
          - type: integer
          - type: 'null'
          title: Review Total Reviews
        review_model_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Review Model Version
        review_analyzed_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Review Analyzed At
        review_data_status:
          anyOf:
